name: Unit Tests

on:
  push:

jobs:
  unit-tests:
    name: Maven unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run unit tests
        run: ./mvnw --batch-mode --no-transfer-progress test
