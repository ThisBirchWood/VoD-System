services:

  postgres:
    image: postgres:15
    container_name: vod_postgres
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: vodSystem
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: src/main/Dockerfile
    container_name: vod_backend
    depends_on:
      - postgres
    env_file:
      - .env
    environment:
      FRONTEND_URL: http://localhost
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vod_frontend
    env_file:
      - .env
    environment:
      VITE_API_URL: ""
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: vod_nginx
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
      - "1935:1935"
    restart: unless-stopped

volumes:
  postgres_data:
