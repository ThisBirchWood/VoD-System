# Local dev: only infrastructure services
# Backend and frontend run directly on the host
# Usage: docker compose -f docker-compose.dev.yml up

services:
  postgres:
    image: postgres:15
    container_name: vod_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ${POSTGRES_DATA}:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  rtmp:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: vod_rtmp
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - WEB_SERVER_URL=http://host.docker.internal:8080
    ports:
      - "1935:1935"
      - "8088:8088"
    volumes:
      - ${STREAM_DATA}:/stream
    pull_policy: build
    restart: unless-stopped